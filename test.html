<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba Mínima - SQLite Cloud</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 { font-size: 1.5rem; color: #1e293b; margin-bottom: 20px; }
        button {
            background-color: #2563eb;
            color: white; border: none;
            padding: 10px 20px; font-size: 1rem;
            border-radius: 6px; cursor: pointer;
            font-weight: 600; transition: background 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        #resultado {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .usuario-item {
            padding: 8px;
            border-bottom: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>⚡ Consulta Rápida a SQLite Cloud</h1>
        <p>Presiona el botón para leer la tabla de pruebas en tiempo real:</p>
        <button onclick="realizarConsulta()">Consultar Base de Datos</button>
        
        <div id="resultado">Los datos aparecerán aquí...</div>
    </div>

    <script>
        // CONFIGURACIÓN HACIA TU BASE DE DATOS DE PRUEBAS
        const SQLITE_CLOUD_URL = 'https://czz5zqwydk.sqlite.cloud/v2/weblite/sql'; 
        const DATABASE_NAME = 'pruebas'; 
        const MASTER_API_KEY = 'orgkey_96b7f2b07b3f3bb298870e5cc9d8f912cfc49715c5926616be2e43fbc2ea397c';

        async function realizarConsulta() {
            const servidorOutput = document.getElementById('resultado');
            servidorOutput.innerText = "Conectando con el servidor en la nube...";

            // 1. Estructuramos la cadena de conexión Bearer requerida por Weblite
            const bearerTokenString = `sqlitecloud://czz5zqwydk.sqlite.cloud:8860?apikey=${MASTER_API_KEY}`;
            
            // 2. Comando SQL inyectando obligatoriamente el USE DATABASE al inicio
            const querySql = `USE DATABASE ${DATABASE_NAME}; SELECT * FROM usuarios;`;

            try {
                const response = await fetch(SQLITE_CLOUD_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${bearerTokenString}`,
                        'Content-Type': 'text/plain',
                        'Accept': 'application/json'
                    },
                    body: querySql
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.message || `Error HTTP: ${response.status}`);
                }

                const res = await response.json();
                const datos = res.data || res;

                // 3. Renderizamos la respuesta en la interfaz
                if (datos && datos.length > 0) {
                    servidorOutput.innerHTML = "";
                    datos.forEach(user => {
                        servidorOutput.innerHTML += `
                            <div class="usuario-item">
                                🆔 <strong>ID:</strong> ${user.id} | 👤 <strong>Nombre:</strong> ${user.nombre} | 🛠️ <strong>Rol:</strong> ${user.rol}
                            </div>
                        `;
                    });
                } else {
                    servidorOutput.innerText = "Conexión exitosa, pero la tabla está vacía.";
                }

            } catch (error) {
                console.error(error);
                servidorOutput.innerHTML = `<span style="color: #dc2626;">❌ <strong>Error:</strong> ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
